<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Pulse Chat</title>

    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #111827;
            --card: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #7c3aed;
            --accent2: #06b6d4;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .card {
            width: min(900px, 100%);
            height: min(85vh, 850px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            backdrop-filter: blur(18px);
            overflow: hidden;
        }

        .login {
            width: 100%;
            max-width: 360px;
            padding: 24px;
            border-radius: 16px;
            background: var(--card);
            border: 1px solid var(--border);
        }

        .input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.06);
            color: white;
            outline: none;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .topbar {
            padding: 14px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            display: flex;
        }

        .me {
            justify-content: flex-end;
        }

        .other {
            justify-content: flex-start;
        }

        .system {
            justify-content: center;
        }

        .bubble {
            max-width: 70%;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.12);
            word-wrap: break-word;
        }

        .me .bubble {
            background: rgba(34,197,94,0.25);
        }

        .system .bubble {
            font-size: 12px;
            color: var(--muted);
        }

        .composer {
            display: flex;
            gap: 10px;
            padding: 12px;
            border-top: 1px solid var(--border);
        }

            .composer input {
                flex: 1;
                padding: 12px;
                border-radius: 20px;
                border: none;
                outline: none;
                font-size: 16px; /* prevents mobile zoom */
            }

            .composer button {
                padding: 12px 18px;
                border-radius: 20px;
                border: none;
                background: var(--accent);
                color: white;
                font-weight: bold;
                cursor: pointer;
                flex-shrink: 0;
            }
    </style>
</head>

<body>

    <div class="page">

        <!-- LOGIN -->
        <div id="login" class="login">
            <h2>Pulse Chat</h2>
            <input class="input" id="username" placeholder="Username">
            <input class="input" id="room" placeholder="Room">
            <button class="btn" onclick="join()">Join</button>
        </div>

        <!-- CHAT -->
        <div id="chat" class="card hidden">

            <div class="topbar">
                <div>
                    <b id="u"></b> | <span id="r"></span>
                </div>
                <button onclick="logout()">Logout</button>
            </div>

            <div id="messages" class="messages"></div>

            <div class="composer">
                <input id="msg" placeholder="Type message..."
                       onkeydown="handleKey(event)">
                <button onclick="send()">Send</button>
            </div>

        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

    <script>
        const conn = new signalR.HubConnectionBuilder()
            .withUrl("/chat")
            .withAutomaticReconnect()
            .build();

        let user = "";
        let room = "";
        let started = conn.start();

        conn.on("ReceiveMessage", (u, msg, img, time) => {

            let div = document.createElement("div");

            if (u === "System") {
                div.className = "msg system";
                div.innerHTML = `<div class="bubble">${msg}</div>`;
            } else {
                let me = u.toLowerCase() === user.toLowerCase();

                div.className = "msg " + (me ? "me" : "other");

                div.innerHTML = `
                <div class="bubble">
                    <b>${u}</b><br>
                    ${msg || ""}
                </div>
            `;
            }

            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop =
                document.getElementById("messages").scrollHeight;
        });

        /* ENTER KEY HANDLER */
        function handleKey(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault(); // stop newline
                send();
            }
        }

        async function join() {
            user = document.getElementById("username").value;
            room = document.getElementById("room").value;

            if (!user || !room) return;

            localStorage.setItem("u", user);
            localStorage.setItem("r", room);

            await started;
            await conn.invoke("JoinRoom", room, user);

            document.getElementById("login").classList.add("hidden");
            document.getElementById("chat").classList.remove("hidden");

            document.getElementById("u").innerText = user;
            document.getElementById("r").innerText = room;
        }

        async function send() {
            let m = document.getElementById("msg").value.trim();
            if (!m) return;

            await started;
            await conn.invoke("SendMessage", room, user, m);

            document.getElementById("msg").value = "";
        }

        async function logout() {
            try {
                await conn.invoke("LeaveRoom", room, user);
            } catch { }

            localStorage.clear();

            document.getElementById("messages").innerHTML = "";
            document.getElementById("chat").classList.add("hidden");
            document.getElementById("login").classList.remove("hidden");
        }

        window.onload = async () => {
            let u = localStorage.getItem("u");
            let r = localStorage.getItem("r");

            if (u && r) {
                user = u;
                room = r;

                await started;
                await conn.invoke("JoinRoom", room, user);

                document.getElementById("login").classList.add("hidden");
                document.getElementById("chat").classList.remove("hidden");

                document.getElementById("u").innerText = user;
                document.getElementById("r").innerText = room;
            }
        };
    </script>

</body>
</html>
