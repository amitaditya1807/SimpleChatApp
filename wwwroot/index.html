<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Pulse Chat</title>

    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #111827;
            --card: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #7c3aed;
            --accent2: #06b6d4;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
            background: radial-gradient(circle at top left, rgba(124,58,237,0.35), transparent 40%), radial-gradient(circle at bottom right, rgba(6,182,212,0.25), transparent 40%), linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
            overscroll-behavior: none;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .card {
            width: min(900px, 100%);
            height: min(85vh, 850px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            backdrop-filter: blur(18px);
            overflow: hidden;
        }

        .login {
            width: 100%;
            max-width: 360px;
            padding: 24px;
            border-radius: 16px;
            background: var(--card);
            border: 1px solid var(--border);
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.06);
            color: white;
            outline: none;
            font-size: 16px;
        }

            .input::placeholder {
                color: #94a3b8;
            }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .topbar {
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            display: flex;
        }

        .me {
            justify-content: flex-end;
        }

        .other {
            justify-content: flex-start;
        }

        .system {
            justify-content: center;
        }

        .bubble {
            max-width: 70%;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.12);
            word-wrap: break-word;
        }

        .me .bubble {
            background: rgba(34,197,94,0.25);
        }

        .system .bubble {
            font-size: 12px;
            color: var(--muted);
            background: rgba(255,255,255,0.06);
        }

        .time {
            margin-top: 6px;
            font-size: 11px;
            color: #cbd5e1;
            opacity: 0.8;
            text-align: right;
        }

        .image {
            display: block;
            max-width: 220px;
            width: 100%;
            border-radius: 12px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .composer {
            display: flex;
            gap: 10px;
            padding: 12px;
            border-top: 1px solid var(--border);
            align-items: center;
        }

            .composer input[type="text"] {
                flex: 1;
                min-width: 0;
                padding: 12px;
                border-radius: 20px;
                border: none;
                outline: none;
                font-size: 16px;
            }

            .composer input[type="file"] {
                max-width: 180px;
                color: var(--muted);
                font-size: 12px;
            }

            .composer button {
                padding: 12px 18px;
                border-radius: 20px;
                border: none;
                background: var(--accent);
                color: white;
                font-weight: bold;
                cursor: pointer;
                flex-shrink: 0;
            }

        @media (max-width: 720px) {
            .page {
                padding: 10px;
                align-items: stretch;
            }

            .card {
                width: 100%;
                height: calc(100vh - 20px);
                border-radius: 18px;
            }

            .composer {
                flex-direction: column;
                align-items: stretch;
            }

                .composer input[type="file"] {
                    max-width: 100%;
                }

                .composer button {
                    width: 100%;
                }

            .bubble {
                max-width: 86%;
            }
        }
    </style>
</head>

<body>

    <div class="page">

        <div id="login" class="login">
            <h2>Pulse Chat</h2>
            <input class="input" id="username" placeholder="Username">
            <input class="input" id="room" placeholder="Room">
            <button class="btn" onclick="join()">Join</button>
        </div>

        <div id="chat" class="card hidden">

            <div class="topbar">
                <div>
                    <b id="u"></b> | <span id="r"></span>
                </div>
                <button onclick="logout()">Logout</button>
            </div>

            <div id="messages" class="messages"></div>

            <div class="composer">
                <input id="msg" type="text" placeholder="Type message..." onkeydown="handleKey(event)">
                <input id="imageInput" type="file" accept="image/*">
                <button onclick="send()">Send</button>
            </div>

        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script>
        const conn = new signalR.HubConnectionBuilder()
            .withUrl("/chat")
            .withAutomaticReconnect()
            .build();

        let user = "";
        let room = "";
        let started = null;

        function ensureStarted() {
            if (!started) {
                started = conn.start().catch(err => {
                    console.error("SignalR start failed:", err);
                    started = null;
                    throw err;
                });
            }
            return started;
        }

        function scrollBottom() {
            const box = document.getElementById("messages");
            box.scrollTop = box.scrollHeight;
        }

        function showChat() {
            document.getElementById("login").classList.add("hidden");
            document.getElementById("chat").classList.remove("hidden");
            document.getElementById("u").innerText = user;
            document.getElementById("r").innerText = room;
        }

        function showLogin() {
            document.getElementById("chat").classList.add("hidden");
            document.getElementById("login").classList.remove("hidden");
        }

        function renderMessage(sender, msg, image, time) {
            const row = document.createElement("div");

            if (sender === "System") {
                row.className = "msg system";
                row.innerHTML = `<div class="bubble">${msg}</div>`;
            } else {
                const me = user && sender && sender.toLowerCase() === user.toLowerCase();
                row.className = "msg " + (me ? "me" : "other");

                const safeMsg = msg || "";
                const safeTime = time || "";

                row.innerHTML = `
                <div class="bubble">
                    <b>${sender}</b><br>
                    ${safeMsg}
                    ${image ? `<img class="image" src="${image}" alt="shared image">` : ""}
                    <div class="time">${safeTime}</div>
                </div>
            `;
            }

            document.getElementById("messages").appendChild(row);
            scrollBottom();
        }

        conn.on("ReceiveMessage", (sender, msg, image, time) => {
            renderMessage(sender, msg, image, time);
        });

        conn.onreconnected(async () => {
            if (user && room) {
                try {
                    await conn.invoke("JoinRoom", room, user);
                } catch (e) {
                    console.error("Rejoin failed:", e);
                }
            }
        });

        async function join() {
            const username = document.getElementById("username").value.trim();
            const roomName = document.getElementById("room").value.trim();

            if (!username || !roomName) return;

            user = username;
            room = roomName;

            localStorage.setItem("u", user);
            localStorage.setItem("r", room);

            await ensureStarted();
            await conn.invoke("JoinRoom", room, user);

            showChat();
        }

        async function send() {
            const message = document.getElementById("msg").value.trim();
            const file = document.getElementById("imageInput").files[0];

            if (!message && !file) return;

            await ensureStarted();

            if (file) {
                if (file.size > 3 * 1024 * 1024) {
                    alert("Max image size is 3 MB");
                    return;
                }

                const base64 = await readFileAsDataURL(file);
                await conn.invoke("SendMessage", room, user, message, base64);
            } else {
                await conn.invoke("SendMessage", room, user, message, "");
            }

            document.getElementById("msg").value = "";
            document.getElementById("imageInput").value = "";
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function handleKey(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                send();
            }
        }

        async function logout() {
            try {
                if (room && user && conn.state === signalR.HubConnectionState.Connected) {
                    await conn.invoke("LeaveRoom", room, user);
                }
            } catch (e) {
                console.error("Leave failed:", e);
            }

            localStorage.removeItem("u");
            localStorage.removeItem("r");

            user = "";
            room = "";
            document.getElementById("messages").innerHTML = "";
            document.getElementById("username").value = "";
            document.getElementById("room").value = "";
            document.getElementById("msg").value = "";
            document.getElementById("imageInput").value = "";

            showLogin();
        }

        window.addEventListener("load", async () => {
            const savedUser = localStorage.getItem("u");
            const savedRoom = localStorage.getItem("r");

            if (savedUser && savedRoom) {
                user = savedUser;
                room = savedRoom;
                showChat();

                try {
                    await ensureStarted();
                    await conn.invoke("JoinRoom", room, user);
                } catch (e) {
                    console.error("Auto-join failed:", e);
                }
            } else {
                showLogin();
            }
        });
    </script>

</body>
</html>
