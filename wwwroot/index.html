<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
</head>
<body>

    <div id="loginDiv">
        <input id="usernameInput" placeholder="Username" />
        <input id="roomInput" placeholder="Room" />
        <button onclick="join()">Join</button>
    </div>

    <div id="chatDiv" style="display:none;">
        <p><b>User:</b> <span id="currentUser"></span></p>
        <p><b>Room:</b> <span id="currentRoom"></span></p>

        <button onclick="logout()">Logout</button>

        <br><br>

        <input id="messageInput" placeholder="Message" />
        <button onclick="send()">Send</button>

        <ul id="messages"></ul>
    </div>

    <script>
        let connection = new signalR.HubConnectionBuilder()
            .withUrl("/chat")
            .build();

        let user = null;
        let room = null;

        // receive messages
        connection.on("ReceiveMessage", function (user, message) {
            let li = document.createElement("li");
            li.textContent = user + ": " + message;
            document.getElementById("messages").appendChild(li);
        });

        // start connection
        connection.start();

        // join room
        function join() {
            user = document.getElementById("usernameInput").value;
            room = document.getElementById("roomInput").value;

            if (!user || !room) {
                alert("Enter username and room");
                return;
            }

            localStorage.setItem("chatUser", user);
            localStorage.setItem("chatRoom", room);

            connection.invoke("JoinRoom", room, user);

            document.getElementById("loginDiv").style.display = "none";
            document.getElementById("chatDiv").style.display = "block";

            document.getElementById("currentUser").textContent = user;
            document.getElementById("currentRoom").textContent = room;
        }

        // send message
        function send() {
            let message = document.getElementById("messageInput").value;

            if (!message) return;

            connection.invoke("SendMessage", room, user, message);

            document.getElementById("messageInput").value = "";
        }

        // logout
        function logout() {
            connection.invoke("LeaveRoom", room, user);

            localStorage.removeItem("chatUser");
            localStorage.removeItem("chatRoom");

            user = null;
            room = null;

            document.getElementById("messages").innerHTML = "";

            document.getElementById("chatDiv").style.display = "none";
            document.getElementById("loginDiv").style.display = "block";

            document.getElementById("usernameInput").value = "";
            document.getElementById("roomInput").value = "";
        }

        // auto login (if stored)
        window.onload = function () {
            let savedUser = localStorage.getItem("chatUser");
            let savedRoom = localStorage.getItem("chatRoom");

            if (savedUser && savedRoom) {
                user = savedUser;
                room = savedRoom;

                connection.invoke("JoinRoom", room, user);

                document.getElementById("loginDiv").style.display = "none";
                document.getElementById("chatDiv").style.display = "block";

                document.getElementById("currentUser").textContent = user;
                document.getElementById("currentRoom").textContent = room;
            }
        };
    </script>

</body>
</html>
