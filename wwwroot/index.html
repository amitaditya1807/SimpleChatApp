<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        #loginDiv {
            width: 300px;
            margin: 120px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        #chatDiv {
            display: none;
            max-width: 700px;
            margin: auto;
        }

        .header {
            background: #0084ff;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        #messages {
            list-style: none;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            background: white;
        }

        li {
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .me {
            background: #dcf8c6;
            float: right;
            clear: both;
        }

        .other {
            background: #f1f0f0;
            float: left;
            clear: both;
        }

        .inputBox {
            display: flex;
            padding: 10px;
            background: white;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            margin-left: 10px;
            padding: 10px;
            background: #0084ff;
            color: white;
            border: none;
        }

        small {
            display: block;
            margin-top: 5px;
            color: gray;
        }
    </style>

</head>

<body>

    <div id="loginDiv">
        <h3>Join Chat</h3>
        <input id="usernameInput" placeholder="Username"><br><br>
        <input id="roomInput" placeholder="Room"><br><br>
        <button onclick="join()">Join</button>
    </div>

    <div id="chatDiv">

        <div class="header">
            <div>
                User: <span id="currentUser"></span> |
                Room: <span id="currentRoom"></span>
            </div>
            <button onclick="logout()">Logout</button>
        </div>

        <ul id="messages"></ul>

        <div class="inputBox">
            <input id="messageInput" placeholder="Message">

            <input type="file" id="imageInput" accept="image/*">

            <button onclick="send()">Send</button>
        </div>

        <small>Max image size: 3 MB</small>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

    <script>
        let connection = new signalR.HubConnectionBuilder()
            .withUrl("/chat")
            .build();

        let user = null;
        let room = null;

        let connectionStarted = connection.start();

        /* RECEIVE MESSAGE */
        connection.on("ReceiveMessage", (u, msg, image) => {

            let li = document.createElement("li");

            li.innerHTML = `<b>${u}:</b> ${msg || ""}`;

            if (image) {
                li.innerHTML += `<br><img src="${image}" style="max-width:200px;border-radius:10px;">`;
            }

            document.getElementById("messages").appendChild(li);

            document.getElementById("messages").scrollTop =
                document.getElementById("messages").scrollHeight;
        });

        /* JOIN */
        function join() {
            user = document.getElementById("usernameInput").value;
            room = document.getElementById("roomInput").value;

            if (!user || !room) return;

            localStorage.setItem("chatUser", user);
            localStorage.setItem("chatRoom", room);

            connectionStarted.then(() => {
                connection.invoke("JoinRoom", room, user);
            });

            showChat();
        }

        /* SEND (with 3MB limit) */
        function send() {
            let msg = document.getElementById("messageInput").value;
            let file = document.getElementById("imageInput").files[0];

            if (!msg && !file) return;

            if (file) {

                // 🔥 3 MB limit
                if (file.size > 3 * 1024 * 1024) {
                    alert("Image must be less than 3 MB");
                    return;
                }

                let reader = new FileReader();

                reader.onload = function (e) {
                    let base64 = e.target.result;

                    connection.invoke("SendMessage", room, user, msg, base64);
                };

                reader.readAsDataURL(file);

            } else {
                connection.invoke("SendMessage", room, user, msg, "");
            }

            document.getElementById("messageInput").value = "";
            document.getElementById("imageInput").value = "";
        }

        /* SHOW UI */
        function showChat() {
            document.getElementById("loginDiv").style.display = "none";
            document.getElementById("chatDiv").style.display = "block";

            document.getElementById("currentUser").innerText = user;
            document.getElementById("currentRoom").innerText = room;
        }

        /* LOGOUT */
        function logout() {
            connection.invoke("LeaveRoom", room, user);

            localStorage.removeItem("chatUser");
            localStorage.removeItem("chatRoom");

            user = null;
            room = null;

            document.getElementById("messages").innerHTML = "";

            document.getElementById("chatDiv").style.display = "none";
            document.getElementById("loginDiv").style.display = "block";
        }

        /* AUTO RESTORE */
        window.onload = function () {
            user = localStorage.getItem("chatUser");
            room = localStorage.getItem("chatRoom");

            if (user && room) {
                showChat();

                connectionStarted.then(() => {
                    connection.invoke("JoinRoom", room, user);
                });
            }
        };
    </script>

</body>
</html>
