<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI";
            background: #e5ddd5;
        }

        #loginDiv {
            width: 300px;
            margin: 120px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        #chatDiv {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: #075e54;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #e5ddd5;
        }

        .msg {
            display: flex;
            margin: 6px 0;
        }

        .bubble {
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            font-size: 14px;
        }

        .me {
            justify-content: flex-end;
        }

            .me .bubble {
                background: #dcf8c6;
            }

        .other {
            justify-content: flex-start;
        }

            .other .bubble {
                background: white;
            }

        .system {
            justify-content: center;
            font-size: 12px;
            color: gray;
        }

        .inputBox {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            background: #075e54;
            color: white;
            border-radius: 20px;
            border: none;
        }

        img {
            max-width: 200px;
            border-radius: 10px;
            margin-top: 5px;
        }
    </style>

</head>

<body>

    <div id="loginDiv">
        <h3>Join Chat</h3>
        <input id="usernameInput" placeholder="Username"><br><br>
        <input id="roomInput" placeholder="Room"><br><br>
        <button onclick="join()">Join</button>
    </div>

    <div id="chatDiv">

        <div class="header">
            <div>
                <b id="currentUser"></b> | <span id="currentRoom"></span>
            </div>
            <button onclick="logout()">Logout</button>
        </div>

        <div id="messages"></div>

        <div class="inputBox">
            <input id="messageInput" placeholder="Message">
            <input type="file" id="imageInput" accept="image/*">
            <button onclick="send()">Send</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

    <script>
        let connection = new signalR.HubConnectionBuilder()
            .withUrl("/chat")
            .build();

        let user = null;
        let room = null;

        let connectionStarted = connection.start();

        /* RECEIVE */
        connection.on("ReceiveMessage", (u, msg, image) => {

            let div = document.createElement("div");

            if (u === "System") {
                div.className = "msg system";
                div.innerText = msg;
            }
            else {
                let isMe = user && u.toLowerCase() === user.toLowerCase();

                div.className = "msg " + (isMe ? "me" : "other");

                let bubble = document.createElement("div");
                bubble.className = "bubble";

                bubble.innerHTML = `<b>${u}</b><br>${msg || ""}`;

                if (image) {
                    bubble.innerHTML += `<br><img src="${image}">`;
                }

                div.appendChild(bubble);
            }

            document.getElementById("messages").appendChild(div);

            document.getElementById("messages").scrollTop =
                document.getElementById("messages").scrollHeight;
        });

        /* JOIN */
        function join() {
            user = document.getElementById("usernameInput").value;
            room = document.getElementById("roomInput").value;

            if (!user || !room) return;

            localStorage.setItem("chatUser", user);
            localStorage.setItem("chatRoom", room);

            connectionStarted.then(() => {
                connection.invoke("JoinRoom", room, user);
            });

            showChat();
        }

        /* SEND */
        function send() {
            let msg = document.getElementById("messageInput").value;
            let file = document.getElementById("imageInput").files[0];

            if (!msg && !file) return;

            if (file) {

                if (file.size > 3 * 1024 * 1024) {
                    alert("Max 3 MB allowed");
                    return;
                }

                let reader = new FileReader();

                reader.onload = function (e) {
                    connection.invoke("SendMessage", room, user, msg || "", e.target.result);
                };

                reader.readAsDataURL(file);

            } else {
                connection.invoke("SendMessage", room, user, msg, "");
            }

            document.getElementById("messageInput").value = "";
            document.getElementById("imageInput").value = "";
        }

        /* UI */
        function showChat() {
            document.getElementById("loginDiv").style.display = "none";
            document.getElementById("chatDiv").style.display = "flex";

            document.getElementById("currentUser").innerText = user;
            document.getElementById("currentRoom").innerText = room;
        }

        /* LOGOUT */
        function logout() {
            connection.invoke("LeaveRoom", room, user);

            localStorage.clear();

            user = null;
            room = null;

            document.getElementById("messages").innerHTML = "";

            document.getElementById("chatDiv").style.display = "none";
            document.getElementById("loginDiv").style.display = "block";
        }

        /* AUTO LOGIN */
        window.onload = function () {
            user = localStorage.getItem("chatUser");
            room = localStorage.getItem("chatRoom");

            if (user && room) {
                showChat();

                connectionStarted.then(() => {
                    connection.invoke("JoinRoom", room, user);
                });
            }
        };
    </script>

</body>
</html>
