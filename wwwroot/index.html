<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Simple Chat</title>

    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #111827;
            --card: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
            --accent: #7c3aed;
            --accent2: #06b6d4;
            --text: #e5e7eb;
            --muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            font-family: Segoe UI, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
            -webkit-text-size-adjust: 100%;
            overscroll-behavior: none;
        }

        .page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .login {
            width: 100%;
            max-width: 380px;
            padding: 24px;
            border-radius: 18px;
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(18px);
        }

            .login h2 {
                margin: 0 0 18px 0;
            }

        .input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.06);
            color: white;
            font-size: 16px;
            outline: none;
        }

            .input::placeholder {
                color: var(--muted);
            }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .card {
            width: min(950px, 100%);
            height: min(88vh, 900px);
            display: flex;
            flex-direction: column;
            border-radius: 22px;
            background: var(--card);
            border: 1px solid var(--border);
            overflow: hidden;
            backdrop-filter: blur(18px);
        }

        .hidden {
            display: none !important;
        }

        .topbar {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
        }

            .topbar button {
                padding: 10px 14px;
                border: none;
                border-radius: 12px;
                background: rgba(255,255,255,0.12);
                color: white;
                cursor: pointer;
                flex-shrink: 0;
            }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            display: flex;
            width: 100%;
        }

        .me {
            justify-content: flex-end;
        }

        .other {
            justify-content: flex-start;
        }

        .system {
            justify-content: center;
        }

        .bubble {
            max-width: min(75%, 620px);
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.12);
            word-break: break-word;
            line-height: 1.4;
        }

        .me .bubble {
            background: rgba(34,197,94,0.25);
            border-top-right-radius: 6px;
        }

        .other .bubble {
            border-top-left-radius: 6px;
        }

        .system .bubble {
            max-width: 92%;
            font-size: 12px;
            color: var(--muted);
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
            text-align: center;
        }

        .image {
            display: block;
            margin-top: 8px;
            max-width: 240px;
            width: 100%;
            border-radius: 12px;
        }

        .time {
            margin-top: 6px;
            font-size: 11px;
            color: #cbd5e1;
            opacity: 0.8;
            text-align: right;
        }

        .composer {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-top: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.96);
            width: 100%;
        }

            .composer input[type="text"] {
                flex: 1;
                min-width: 0;
                padding: 12px 14px;
                border-radius: 999px;
                border: none;
                outline: none;
                font-size: 16px;
                background: rgba(255,255,255,0.08);
                color: white;
            }

                .composer input[type="text"]::placeholder {
                    color: var(--muted);
                }

            .composer input[type="file"] {
                width: 160px;
                max-width: 160px;
                font-size: 12px;
                color: var(--muted);
                flex-shrink: 0;
            }

            .composer button {
                flex-shrink: 0;
                padding: 12px 16px;
                border-radius: 999px;
                border: none;
                background: var(--accent);
                color: white;
                font-weight: 700;
                cursor: pointer;
                white-space: nowrap;
            }

        /* Mobile */
        @media (max-width: 720px) {
            .page {
                padding: 0;
                align-items: stretch;
            }

            .login {
                width: calc(100% - 24px);
                margin: auto;
            }

            .card {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .topbar {
                padding: 12px 14px;
            }

                .topbar b {
                    font-size: 14px;
                }

            .messages {
                padding: 12px;
            }

            .bubble {
                max-width: 88%;
            }

            .composer {
                display: grid;
                grid-template-columns: 1fr auto;
                grid-template-areas:
                    "msg send"
                    "file file";
                gap: 8px;
                align-items: center;
            }

                .composer input[type="text"] {
                    grid-area: msg;
                    width: 100%;
                }

                .composer button {
                    grid-area: send;
                    padding: 12px 14px;
                }

                .composer input[type="file"] {
                    grid-area: file;
                    width: 100%;
                    max-width: none;
                    display: block;
                    background: rgba(255,255,255,0.08);
                    padding: 10px;
                    border-radius: 14px;
                    border: 1px solid var(--border);
                }

            .image {
                max-width: 200px;
            }
        }
    </style>
</head>

<body>

    <div class="page">

        <div id="login" class="login">
            <h2>Simple Chat</h2>
            <input class="input" id="username" placeholder="Username">
            <input class="input" id="room" placeholder="Room">
            <button class="btn" onclick="join()">Join</button>
        </div>

        <div id="chat" class="card hidden">
            <div class="topbar">
                <div>
                    <b id="u"></b> | <span id="r"></span>
                </div>
                <button onclick="logout()">Logout</button>
            </div>

            <div id="messages" class="messages"></div>

            <div class="composer">
                <input id="msg" type="text" placeholder="Type message..." onkeydown="handleKey(event)">
                <input id="img" type="file" accept="image/*">
                <button onclick="send()">Send</button>
            </div>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

    <script>
        const conn = new signalR.HubConnectionBuilder()
            .withUrl("/chat")
            .withAutomaticReconnect()
            .build();

        let user = "";
        let room = "";
        let started = conn.start();

        function scrollBottom() {
            const box = document.getElementById("messages");
            box.scrollTop = box.scrollHeight;
        }

        conn.on("ReceiveMessage", (u, msg, img, time) => {
            const div = document.createElement("div");

            if (u === "System") {
                div.className = "msg system";
                div.innerHTML = `<div class="bubble">${msg}</div>`;
            } else {
                const me = user && u && u.toLowerCase() === user.toLowerCase();
                div.className = "msg " + (me ? "me" : "other");

                div.innerHTML = `
                <div class="bubble">
                    <b>${u}</b><br>
                    ${msg || ""}
                    ${img ? `<img class="image" src="${img}" alt="shared image">` : ""}
                    <div class="time">${time || ""}</div>
                </div>
            `;
            }

            document.getElementById("messages").appendChild(div);
            scrollBottom();
        });

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        }

        async function join() {
            user = document.getElementById("username").value.trim();
            room = document.getElementById("room").value.trim();

            if (!user || !room) return;

            await started;
            await conn.invoke("JoinRoom", room, user);

            document.getElementById("login").classList.add("hidden");
            document.getElementById("chat").classList.remove("hidden");

            document.getElementById("u").innerText = user;
            document.getElementById("r").innerText = room;
        }

        async function send() {
            const msg = document.getElementById("msg").value.trim();
            const file = document.getElementById("img").files[0];

            if (!msg && !file) return;

            await started;

            let base64 = "";

            if (file) {
                if (file.size > 3 * 1024 * 1024) {
                    alert("Max 3MB allowed");
                    return;
                }

                base64 = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            }

            await conn.invoke("SendMessage", room, user, msg || "", base64);

            document.getElementById("msg").value = "";
            document.getElementById("img").value = "";
        }

        async function logout() {
            try {
                await conn.invoke("LeaveRoom", room, user);
            } catch { }
            location.reload();
        }
    </script>

</body>
</html>
